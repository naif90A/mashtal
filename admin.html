<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إدارة مشاتل الناصرية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #040d08; color: white; padding: 20px; text-align: center; }
        .box { max-width: 500px; margin: auto; background: #0a160f; padding: 30px; border: 1px solid #d4af37; border-radius: 15px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; }
        button { background: #d4af37; color: black; font-weight: bold; cursor: pointer; border: none; }
        .list-item { display: flex; justify-content: space-between; background: #000; padding: 10px; margin-top: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>إدارة المحتوى السحابي</h2>
    <div class="box">
        <input type="text" id="pName" placeholder="اسم النبتة">
        <select id="pCat">
            <option value="fruit">الأشجار المثمرة</option>
            <option value="ornamental">أشجار الزينة</option>
            <option value="indoor">نباتات الظل</option>
        </select>
        <label><input type="checkbox" id="isMoving"> إضافة للسلايدر (نخبة الناصرية)</label>
        <input type="file" id="pFile" accept="image/*">
        <button id="uploadBtn" onclick="upload()">حفظ ونشر الآن</button>
        <hr>
        <h3>المحتوى الحالي</h3>
        <div id="itemList"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cuaoopauabnmpmoddvby.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1YW9vcGF1YWJubXBtb2RkdmJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjgyNDUsImV4cCI6MjA5MzIwNDI0NX0._vyBPMk3oaJqMJaBRY4DaKj2ZjSodKPxZ77kFiZUH9o';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function upload() {
            const file = document.getElementById('pFile').files[0];
            const name = document.getElementById('pName').value;
            const btn = document.getElementById('uploadBtn');

            if(!file || !name) return alert("اكمل البيانات");
            btn.disabled = true; btn.innerText = "جاري الرفع...";

            try {
                const fileName = `${Date.now()}_${file.name}`;
                const { data: upData, error: upErr } = await _supabase.storage.from('nasriya_assets').upload(fileName, file);
                if(upErr) throw upErr;

                const { data: urlData } = _supabase.storage.from('nasriya_assets').getPublicUrl(fileName);

                await _supabase.from('plants_data').insert([{
                    name: name,
                    category: document.getElementById('pCat').value,
                    is_moving: document.getElementById('isMoving').checked,
                    image_url: urlData.publicUrl
                }]);

                alert("تمت الإضافة!"); location.reload();
            } catch (e) { alert(e.message); btn.disabled = false; }
        }

        async function loadItems() {
            const { data } = await _supabase.from('plants_data').select('*').order('id', {ascending: false});
            document.getElementById('itemList').innerHTML = data.map(i => `
                <div class="list-item">
                    <span>${i.name}</span>
                    <button onclick="del(${i.id})" style="width:auto; padding:2px 10px; background:red; color:white;">حذف</button>
                </div>
            `).join('');
        }
        async function del(id) { if(confirm("حذف؟")) { await _supabase.from('plants_data').delete().eq('id', id); loadItems(); } }
        window.onload = loadItems;
    </script>
</body>
</html>
