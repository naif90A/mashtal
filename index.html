<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاتل الناصرية | الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- استدعاء مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #040d08; --gold: #d4af37; --panel: #081a10; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Cairo', sans-serif; min-height: 100vh; }
        
        .hero { height: 40vh; display: flex; align-items: center; justify-content: center; background: #0a160f; text-align: center; border-bottom: 2px solid var(--gold); }
        .hero h1 span { color: var(--gold); }

        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .section-title { border-right: 4px solid var(--gold); padding-right: 15px; margin: 40px 0 20px; font-size: 1.8rem; }

        /* تنسيق الشبكة (Grid) */
        .plants-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; justify-items: center; }

        /* كرت النبتة */
        .card { width: 100%; max-width: 300px; background: var(--panel); border: 1px solid rgba(212,175,55,0.2); border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .card img { width: 100%; height: 320px; object-fit: cover; background: #000; }
        .card-info { padding: 20px; text-align: center; }
        .card-info h3 { margin: 0; font-size: 1.3rem; }

        /* السلايدر المتحرك */
        .slider-box { overflow: hidden; width: 100%; padding: 20px 0; background: rgba(212,175,55,0.05); border-radius: 15px; }
        .track { display: flex; gap: 25px; width: max-content; animation: scroll 40s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        #error-msg { color: #ff6b6b; text-align: center; padding: 20px; display: none; }
        .loading { text-align: center; padding: 50px; font-size: 1.5rem; color: var(--gold); }
    </style>
</head>
<body>

    <header class="hero">
        <div><h1>مشاتل <span>الناصرية</span></h1><p>الفخامة في كل شتلة</p></div>
    </header>

    <div id="error-msg"></div>

    <main class="container" id="gallery">
        <div class="loading">جاري تحميل المعرض...</div>
    </main>

    <script>
        // 1. إعدادات المفاتيح (تم التأكد منها)
        const SUPABASE_URL = 'https://cuaoopauabnmpmoddvby.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1YW9vcGF1YWJubXBtb2RkdmJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjgyNDUsImV4cCI6MjA5MzIwNDI0NX0._vyBPMk3oaJqMJaBRY4DaKj2ZjSodKPxZ77kFiZUH9o';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const categoryNames = {
            fruit: "الأشجار المثمرة",
            ornamental: "أشجار الزينة",
            indoor: "نباتات الظل"
        };

        async function init() {
            const gallery = document.getElementById('gallery');
            const errorDiv = document.getElementById('error-msg');

            try {
                // 2. جلب البيانات من جدول plants_data
                let { data: plants, error } = await _supabase
                    .from('plants_data')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!plants || plants.length === 0) {
                    gallery.innerHTML = '<div style="text-align:center; padding:50px;">لا توجد نباتات مضافة حالياً. يرجى الإضافة من لوحة التحكم.</div>';
                    return;
                }

                gallery.innerHTML = ""; // مسح كلمة جاري التحميل

                // 3. عرض قسم "نخبة الناصرية" (السلايدر)
                const movingPlants = plants.filter(p => p.is_moving === true);
                if (movingPlants.length > 0) {
                    const sliderHTML = `
                        <h2 class="section-title">نخبة الناصرية</h2>
                        <div class="slider-box">
                            <div class="track">
                                ${[...movingPlants, ...movingPlants].map(p => createCardHTML(p)).join('')}
                            </div>
                        </div>
                    `;
                    gallery.innerHTML += sliderHTML;
                }

                // 4. عرض الأقسام الأخرى
                for (const [key, label] of Object.entries(categoryNames)) {
                    const filtered = plants.filter(p => p.category === key && !p.is_moving);
                    if (filtered.length > 0) {
                        const sectionHTML = `
                            <h2 class="section-title">${label}</h2>
                            <div class="plants-grid">
                                ${filtered.map(p => createCardHTML(p)).join('')}
                            </div>
                        `;
                        gallery.innerHTML += sectionHTML;
                    }
                }

            } catch (err) {
                console.error("خطأ في التحميل:", err);
                errorDiv.style.display = "block";
                errorDiv.innerText = "حدث خطأ أثناء جلب البيانات: " + err.message;
                gallery.innerHTML = "";
            }
        }

        function createCardHTML(plant) {
            // نستخدم الصورة المباشرة من رابط السحاب
            return `
                <div class="card">
                    <img src="${plant.image_url}" alt="${plant.name}" onerror="this.src='https://via.placeholder.com/300x400?text=Image+Error'">
                    <div class="card-info">
                        <h3>${plant.name}</h3>
                        <p style="color:var(--gold); font-size:0.9rem; margin-top:5px;">إصدار النخبة</p>
                    </div>
                </div>
            `;
        }

        // تشغيل الوظيفة عند فتح الصفحة
        window.onload = init;
    </script>
</body>
</html>
