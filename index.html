<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاتل الناصرية | الفخامة الزراعية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-dark: #040d08;
            --bg-panel: #081a10;
            --gold-solid: #d4af37;
            --gold-gradient: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --text-light: #f5f5f5;
            --text-muted: #a0aab2;
            --glass-border: rgba(212, 175, 55, 0.15);
        }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Cairo', sans-serif; background-color: var(--bg-dark); color: var(--text-light); overflow-x: hidden; }
        .hero-section { position: relative; height: 85vh; display: flex; align-items: center; justify-content: center; text-align: center; background-image: url('https://images.unsplash.com/photo-1466692476877-361ad3532bf6?auto=format&fit=crop&q=80&w=1920'); background-attachment: fixed; background-position: center; background-size: cover; overflow: hidden; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(4, 13, 8, 0.4) 0%, var(--bg-dark) 100%); }
        .hero-content { position: relative; z-index: 2; padding: 0 20px; animation: fadeUp 1.5s ease-out; }
        .main-title { font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 900; margin: 0; color: #fff; }
        .main-title span { background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .video-container { max-width: 1500px; margin: 60px auto; padding: 0 20px; }
        .video-wrapper { position: relative; border: 1px solid var(--glass-border); overflow: hidden; }
        .video-wrapper video { width: 100%; display: block; aspect-ratio: 21/9; object-fit: cover; }
        .gallery-container { max-width: 1500px; margin: 80px auto; padding: 0 20px; }
        .luxury-card { width: 340px; height: 480px; background: var(--bg-panel); border: 1px solid var(--glass-border); transition: 0.5s; display: flex; flex-direction: column; }
        .card-image-box { height: 75%; overflow: hidden; }
        .card-image-box img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }
        .card-info { padding: 25px; border-top: 1px solid var(--glass-border); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="main-title">مشاتل <span>الناصرية</span></h1>
            <p>فخامة الطبيعة في منزلك</p>
        </div>
    </header>

    <div id="video-promo-area"></div>
    <main class="gallery-container" id="luxury-gallery"></main>

    <script>
        const SUPABASE_URL = 'https://cuaoopauabnmpmoddvby.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1YW9vcGF1YWJubXBtb2RkdmJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjgyNDUsImV4cCI6MjA5MzIwNDI0NX0._vyBPMk3oaJqMJaBRY4DaKj2ZjSodKPxZ77kFiZUH9o';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function init() {
            // جلب الفيديو من جدول site_settings
            const { data: settings } = await _supabase.from('site_settings').select('*').eq('key', 'promo_video').single();
            if (settings && settings.value) {
                document.getElementById('video-promo-area').innerHTML = `
                    <div class="video-container">
                        <div class="video-wrapper">
                            <video autoplay muted loop playsinline><source src="${settings.value}" type="video/mp4"></video>
                        </div>
                    </div>`;
            }

            // جلب النباتات من جدول plants_data
            const { data: plants } = await _supabase.from('plants_data').select('*');
            if (plants) {
                const container = document.getElementById('luxury-gallery');
                container.innerHTML = `<div style="display: flex; flex-wrap: wrap; gap: 30px; justify-content: center;">
                    ${plants.map(p => `
                        <div class="luxury-card">
                            <div class="card-image-box"><img src="${p.image_url}"></div>
                            <div class="card-info"><h3 style="color:white;">${p.name}</h3></div>
                        </div>
                    `).join('')}
                </div>`;
            }
        }
        init();
    </script>
</body>
</html>
