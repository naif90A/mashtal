<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاتل الناصرية | الفخامة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #040d08; --gold: #d4af37; --panel: #081a10; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Cairo', sans-serif; }
        
        .hero { height: 50vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(0,0,0,0.5), var(--bg)), url('https://images.unsplash.com/photo-1466692476877-361ad3532bf6?auto=format&fit=crop&q=80&w=1000'); background-size: cover; text-align: center; }
        .hero h1 { font-size: 3rem; margin: 0; }
        .hero h1 span { color: var(--gold); }

        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .section-title { border-right: 4px solid var(--gold); padding-right: 15px; margin: 40px 0 20px; }

        /* السلايدر المتحرك */
        .slider { overflow: hidden; padding: 20px 0; }
        .track { display: flex; gap: 20px; width: max-content; animation: scroll 30s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* كرت النبتة */
        .card { width: 280px; background: var(--panel); border: 1px solid rgba(212,175,55,0.1); border-radius: 10px; overflow: hidden; }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card-info { padding: 15px; text-align: center; }
    </style>
</head>
<body>

    <header class="hero">
        <div><h1>مشاتل <span>الناصرية</span></h1><p>عراقة وجودة</p></div>
    </header>

    <main class="container" id="gallery"></main>

    <script>
        const SUPABASE_URL = 'https://cuaoopauabnmpmoddvby.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1YW9vcGF1YWJubXBtb2RkdmJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjgyNDUsImV4cCI6MjA5MzIwNDI0NX0._vyBPMk3oaJqMJaBRY4DaKj2ZjSodKPxZ77kFiZUH9o';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const cats = { fruit: "الأشجار المثمرة", ornamental: "أشجار الزينة", indoor: "نباتات الظل" };

        async function loadSite() {
            const { data: plants } = await _supabase.from('plants_data').select('*').order('id', {ascending: false});
            const gallery = document.getElementById('gallery');
            if(!plants) return;

            // 1. قسم النخبة (سلايدر)
            const moving = plants.filter(p => p.is_moving);
            if(moving.length > 0) {
                gallery.innerHTML += `<h2 class="section-title">نخبة الناصرية</h2>
                <div class="slider"><div class="track">${[...moving, ...moving].map(p => `<div class="card"><img src="${p.image_url}"><div class="card-info"><h3>${p.name}</h3></div></div>`).join('')}</div></div>`;
            }

            // 2. بقية الأقسام
            for (let key in cats) {
                const filtered = plants.filter(p => p.category === key && !p.is_moving);
                if(filtered.length > 0) {
                    gallery.innerHTML += `<h2 class="section-title">${cats[key]}</h2>
                    <div style="display:flex; flex-wrap:wrap; gap:20px; justify-content:center;">
                        ${filtered.map(p => `<div class="card"><img src="${p.image_url}"><div class="card-info"><h3>${p.name}</h3></div></div>`).join('')}
                    </div>`;
                }
            }
        }
        window.onload = loadSite;
    </script>
</body>
</html>
