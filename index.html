<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاتل الناصرية | الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #040d08; --gold: #d4af37; --panel: #081a10; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Cairo', sans-serif; min-height: 100vh; }
        .hero { height: 35vh; display: flex; align-items: center; justify-content: center; background: #0a160f; text-align: center; border-bottom: 2px solid var(--gold); }
        .hero h1 span { color: var(--gold); }
        .container { max-width: 1200px; margin: 40px auto; padding: 20px; }
        .section-title { border-right: 4px solid var(--gold); padding-right: 15px; margin: 40px 0 20px; font-size: 1.8rem; }
        .plants-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; justify-items: center; }
        .card { width: 100%; max-width: 300px; background: var(--panel); border: 1px solid rgba(212,175,55,0.2); border-radius: 12px; overflow: hidden; transition: 0.3s; }
        .card img { width: 100%; height: 320px; object-fit: cover; background: #000; }
        .card-info { padding: 20px; text-align: center; }
        .slider-box { overflow: hidden; width: 100%; padding: 20px 0; background: rgba(212,175,55,0.05); border-radius: 15px; }
        .track { display: flex; gap: 25px; width: max-content; animation: scroll 40s linear infinite; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        #error-msg { color: #ff6b6b; text-align: center; padding: 20px; display: none; background: rgba(255,0,0,0.1); }
        .loading { text-align: center; padding: 50px; font-size: 1.5rem; color: var(--gold); }
    </style>
</head>
<body>

    <header class="hero">
        <div><h1>مشاتل <span>الناصرية</span></h1><p>الفخامة في كل شتلة</p></div>
    </header>

    <div id="error-msg"></div>

    <main class="container" id="gallery">
        <div class="loading">جاري تحميل المعرض...</div>
    </main>

    <script>
        const SUPABASE_URL = 'https://cuaoopauabnmpmoddvby.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1YW9vcGF1YWJubXBtb2RkdmJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjgyNDUsImV4cCI6MjA5MzIwNDI0NX0._vyBPMk3oaJqMJaBRY4DaKj2ZjSodKPxZ77kFiZUH9o';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const categoryNames = { fruit: "الأشجار المثمرة", ornamental: "أشجار الزينة", indoor: "نباتات الظل" };

        async function init() {
            const gallery = document.getElementById('gallery');
            const errorDiv = document.getElementById('error-msg');

            try {
                // تم إزالة created_at واستخدام id بدلاً منه للترتيب
                let { data: plants, error } = await _supabase
                    .from('plants_data')
                    .select('*')
                    .order('id', { ascending: false });

                if (error) throw error;

                if (!plants || plants.length === 0) {
                    gallery.innerHTML = '<div style="text-align:center; padding:50px;">لا توجد نباتات مضافة حالياً.</div>';
                    return;
                }

                gallery.innerHTML = ""; 

                // 1. السلايدر
                const movingPlants = plants.filter(p => p.is_moving === true);
                if (movingPlants.length > 0) {
                    gallery.innerHTML += `
                        <h2 class="section-title">نخبة الناصرية</h2>
                        <div class="slider-box">
                            <div class="track">${[...movingPlants, ...movingPlants].map(p => createCardHTML(p)).join('')}</div>
                        </div>`;
                }

                // 2. الأقسام
                for (const [key, label] of Object.entries(categoryNames)) {
                    const filtered = plants.filter(p => p.category === key && !p.is_moving);
                    if (filtered.length > 0) {
                        gallery.innerHTML += `
                            <h2 class="section-title">${label}</h2>
                            <div class="plants-grid">${filtered.map(p => createCardHTML(p)).join('')}</div>`;
                    }
                }

            } catch (err) {
                errorDiv.style.display = "block";
                errorDiv.innerText = "حدث خطأ: " + err.message;
                gallery.innerHTML = "";
            }
        }

        function createCardHTML(plant) {
            return `
                <div class="card">
                    <img src="${plant.image_url}" onerror="this.src='https://via.placeholder.com/300x400?text=Image+Error'">
                    <div class="card-info">
                        <h3>${plant.name}</h3>
                        <p style="color:var(--gold); font-size:0.9rem;">إصدار النخبة</p>
                    </div>
                </div>`;
        }

        window.onload = init;
    </script>
</body>
</html>
